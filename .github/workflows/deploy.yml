name: Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infrastructure: ${{ steps.filter.outputs.infrastructure }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            frontend:
              - 'frontend/**'
            infrastructure:
              - 'infrastructure/**'

  test-api:
    needs: [changes]
    if: needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
        working-directory: api
      - run: npm test
        working-directory: api

  test-frontend:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
        working-directory: frontend
      - run: npm test
        working-directory: frontend

  test-infrastructure:
    needs: [changes]
    if: needs.changes.outputs.infrastructure == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
        working-directory: infrastructure
      - run: npm test
        working-directory: infrastructure

  ci:
    needs: [test-api, test-frontend, test-infrastructure]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.test-api.result }}" == "failure" || \
                "${{ needs.test-frontend.result }}" == "failure" || \
                "${{ needs.test-infrastructure.result }}" == "failure" ]]; then
            exit 1
          fi

  deploy:
    needs: [changes, ci]
    if: >-
      always() &&
      needs.ci.result == 'success' &&
      github.event_name != 'pull_request' &&
      (
        needs.changes.outputs.api == 'true' ||
        needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.infrastructure == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
          mask-aws-account-id: true
      - name: Install frontend deps
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        run: npm ci
        working-directory: frontend
      - name: Build frontend
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        run: npm run build
        working-directory: frontend
      - run: npm ci
        working-directory: api
      - run: npm ci
        working-directory: infrastructure
      - run: npx cdk deploy --all -c stage=prod --require-approval never
        working-directory: infrastructure

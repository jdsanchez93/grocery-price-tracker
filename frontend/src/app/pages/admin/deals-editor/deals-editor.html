<div class="card">
    <h2 class="text-xl font-semibold mb-4">Deals Editor</h2>
    <p-fluid>
        <fieldset class="filter-fieldset">
            <legend>Browse by Store &amp; Week</legend>
            <div class="flex flex-col gap-4">

                <div class="flex flex-col gap-1">
                    <label for="storeInstance">Store</label>
                    <p-select inputId="storeInstance" [options]="storeOptions()"
                        [ngModel]="selectedStoreId()" (ngModelChange)="onStoreChange($event)"
                        placeholder="Select store" [disabled]="loadingMeta()" />
                </div>

                <div class="flex flex-col gap-1">
                    <label for="weekId">Week</label>
                    <p-select inputId="weekId" [options]="availableWeeks()"
                        [ngModel]="selectedWeekId()" (ngModelChange)="onWeekChange($event)"
                        placeholder="Select week" [disabled]="!selectedStoreId() || loadingMeta()" />
                </div>

            </div>
        </fieldset>
    </p-fluid>
</div>

@if (selection()) {
  <app-deals-table
    [deals]="deals()"
    [columns]="columns()"
    [loading]="loadingDeals()"
    [selectable]="true"
    [(selectedDeals)]="selectedDeals"
  >
    @if (selectedDeals().length > 0) {
      <ng-template #captionActions>
        <p-button
          [label]="'Edit ' + selectedDeals().length + (selectedDeals().length === 1 ? ' deal' : ' deals')"
          icon="pi pi-pencil"
          (onClick)="openEditDialog(selectedDeals())"
        />
        <p-button
          label="Clear"
          [text]="true"
          severity="secondary"
          (onClick)="clearSelection()"
        />
      </ng-template>
    }
    <ng-template #rowActions let-deal>
      <p-button
        icon="pi pi-pencil"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        size="small"
        (onClick)="openEditDialog([deal])"
        [attr.aria-label]="'Edit ' + deal.name"
      />
    </ng-template>
  </app-deals-table>
}

<app-deal-edit-dialog (saved)="onDealsSaved($event)" />
